<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAPTCHA Demo</title>
<style>
  body{font-family:system-ui,Segoe UI,Helvetica,Arial;display:flex;align-items:center;justify-content:center;height:100vh;background:#f3f4f6}
  .card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08);width:360px}
  canvas{display:block;margin:0 0 12px 0;border-radius:6px;background:#eef2ff}
  .row{display:flex;gap:8px;align-items:center}
  input[type="text"]{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px}
  button{padding:8px 12px;border-radius:8px;border:0;background:#2563eb;color:white;cursor:pointer}
  .muted{font-size:13px;color:#666;margin-top:10px}
</style>
</head>
<body>
  <div class="card">
    <h3>Verificação</h3>
    <canvas id="cap" width="320" height="80"></canvas>
    <div class="row">
      <input id="answer" placeholder="Digite os caracteres" autocomplete="off">
      <button id="check">OK</button>
      <button id="regen" title="Gerar outro">🔁</button>
    </div>
    <div class="muted">Dica: letras e números. Case-insensitive.</div>
    <div id="result" style="margin-top:10px;font-weight:600"></div>
  </div>

<script>
(function(){
  const canvas = document.getElementById('cap');
  const ctx = canvas.getContext('2d');
  const answerEl = document.getElementById('answer');
  const resultEl = document.getElementById('result');
  let current = '';

  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function randChoice(s){ return s[Math.floor(Math.random()*s.length)]; }

  function generateText(len=6){
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // evita I,O,1,0
    let t = '';
    for(let i=0;i<len;i++) t += randChoice(chars);
    return t;
  }

  function drawCaptcha(text){
    // limpa
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // fundo com ruído
    ctx.fillStyle = '#f7fbff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<80;i++){
      ctx.fillStyle = `rgba(${randInt(100,220)},${randInt(100,220)},${randInt(100,220)},${Math.random()*0.25})`;
      ctx.beginPath();
      ctx.arc(randInt(0,canvas.width), randInt(0,canvas.height), randInt(1,3), 0, Math.PI*2);
      ctx.fill();
    }

    // texto com distorção
    const gap = canvas.width / (text.length+1);
    for(let i=0;i<text.length;i++){
      const ch = text[i];
      const fontSize = randInt(28,44);
      ctx.font = `${fontSize}px Arial`;
      ctx.save();
      const x = gap*(i+1) + randInt(-8,8);
      const y = canvas.height/2 + randInt(6,14);
      const angle = (Math.random()-0.5) * 0.6; // radianos
      ctx.translate(x,y);
      ctx.rotate(angle);
      ctx.fillStyle = `rgba(${randInt(20,80)},${randInt(20,80)},${randInt(20,80)},1)`;
      ctx.fillText(ch, 0, 0);
      ctx.restore();
    }

    // linhas sobrepostas
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(randInt(0,canvas.width), randInt(0,canvas.height));
      ctx.lineTo(randInt(0,canvas.width), randInt(0,canvas.height));
      ctx.lineWidth = Math.random()*2 + 0.5;
      ctx.strokeStyle = `rgba(${randInt(0,120)},${randInt(0,120)},${randInt(0,120)},${Math.random()*0.5})`;
      ctx.stroke();
    }
  }

  function regen(){
    current = generateText(6);
    drawCaptcha(current);
    answerEl.value = '';
    resultEl.textContent = '';
  }

  document.getElementById('regen').addEventListener('click', regen);
  document.getElementById('check').addEventListener('click', ()=>{
    const user = answerEl.value.trim().toUpperCase();
    if(!user){ resultEl.style.color='crimson'; resultEl.textContent='Digite o CAPTCHA'; return; }
    if(user === current.toUpperCase()){
      resultEl.style.color='green';
      resultEl.textContent='Correto — você passou.';
    } else {
      resultEl.style.color='crimson';
      resultEl.textContent='Incorreto — tente novamente.';
      regen(); // opcional: gerar novo
    }
  });

  // Enter tecla
  answerEl.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('check').click(); });

  // inicializa
  regen();
})();
</script>
</body>
</html>
